<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ 陈东洋和点点的小窝</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #fef3e0;
            overflow-x: hidden;
        }

        /* ===== 左上角标题 ===== */
        .top-bar {
            position: fixed;
            top: 0; left: 0; z-index: 99;
            padding: 16px 24px;
            font-size: 18px;
            color: #d47a6b;
            font-weight: bold;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-radius: 0 0 20px 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            letter-spacing: 2px;
        }
        .top-icon { font-size: 20px; margin-right: 5px; }

        .story {
            position: relative; z-index: 2;
            padding-top: 70px; padding-bottom: 40px;
        }

        /* ===== 大标题区域 ===== */
        .main-title { text-align: center; padding: 30px 20px 10px; }
        .main-title h1 {
            font-size: 38px; color: #d47a6b;
        }
        .main-title .sub {
            font-size: 14px; color: #bbb;
            letter-spacing: 3px; margin-top: 5px;
        }

        /* ===== 照片网格 ===== */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
            align-items: start;
        }
        .photo-item { text-align: center; }
        .photo-item img {
            width: 100%;
            height: auto;
            border-radius: 14px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
            display: block;
            cursor: pointer;
            /* 悬停动画 */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .photo-item img:hover {
            transform: translateY(-6px);   /* 微微上浮 */
            box-shadow: 0 16px 35px rgba(0,0,0,0.18);  /* 阴影加深 */
        }
        .photo-item .caption { margin-top: 6px; font-size: 13px; color: #888; }
        .photo-item .location { font-size: 12px; color: #bbb; }

        .bottom-note { text-align: center; padding: 40px 20px 30px; }
        .bottom-note p { font-size: 16px; color: #d47a6b; letter-spacing: 2px; }

        /* ===== 飘落爱心 ===== */
        canvas {
            position: fixed; top: 0; left: 0;
            z-index: 1; pointer-events: none;
        }

        /* ===== 灯箱 ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
            cursor: default;
        }
        .lightbox .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        }
        .lightbox .close-btn:hover { transform: scale(1.2); }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 手机适配 */
        @media (max-width: 600px) {
            .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .top-bar { font-size: 15px; padding: 12px 18px; }
            .main-title h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <!-- 左上角小窝 -->
    <div class="top-bar">
        <span class="top-icon">❤️</span>
        陈东洋和点点的小窝
    </div>

    <canvas id="heartsCanvas"></canvas>

    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="closeLightbox">&times;</span>
        < img src="" alt="" id="lightboxImg">
    </div>

    <div class="story">
        <!-- 大标题 -->
        <div class="main-title">
            <h1>照片墙 ❤️</h1>
            <p class="sub">说白了，跟你在一起之后还特地为你搭了个网站</p >
        </div>

        <!-- 照片网格 -->
        <div class="photo-grid">
            <!-- 照片1 -->
            <div class="photo-item">
                <img src="photos/1.jpg?v=1" alt="" onclick="openLightbox(this.src)">
                <p class="caption">臭宝记得我第一次给你拍的照片吗？</p >
                <p class="location">📍 桔子岛</p >
            </div>
            <!-- 照片2 -->
            <div class="photo-item">
                <img src="photos/2.jpg?v=1" alt="" onclick="openLightbox(this.src)">
                <p class="caption">这张也是 个人感觉给你拍最好看的嘿嘿</p >
                <p class="location">📍 桔子岛</p >
            </div>
        </div>

        <!-- 底部 -->
        <div class="bottom-note">
            <p>属于陈东洋和点点的小世界 ❤️</p >
        </div>
    </div>

    <script>
        // ===== 灯箱功能 =====
        var lightbox = document.getElementById("lightbox");
        var lightboxImg = document.getElementById("lightboxImg");
        var closeBtn = document.getElementById("closeLightbox");

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add("active");
        }

        function closeLightbox() {
            lightbox.classList.remove("active");
        }

        // 点关闭按钮
        closeBtn.addEventListener("click", closeLightbox);

        // 点背景关闭
        lightbox.addEventListener("click", function(e) {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // 按 Esc 关闭
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape" && lightbox.classList.contains("active")) {
                closeLightbox();
            }
        });

        // ===== 飘落爱心 =====
        var canvas = document.getElementById("heartsCanvas");
        var ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var hearts = [];
        for (var i = 0; i < 30; i++) {
            hearts.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 16 + 6,
                speed: Math.random() * 0.8 + 0.2,
                opacity: Math.random() * 0.35 + 0.15,
                drift: Math.random() * 0.3 - 0.15
            });
        }

        function drawHearts() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = 0; i < hearts.length; i++) {
                var h = hearts[i];
                ctx.font = h.size + "px Arial";
                ctx.fillStyle = "rgba(220, 130, 140, " + h.opacity + ")";
                ctx.fillText("❤", h.x, h.y);
                h.y -= h.speed;
                h.x += h.drift;
                if (h.y < -30) { h.y = canvas.height + 30; h.x = Math.random() * canvas.width; }
                if (h.x > canvas.width + 30) h.x = -30;
                if (h.x < -30) h.x = canvas.width + 30;
            }
            requestAnimationFrame(drawHearts);
        }
        drawHearts();

        window.addEventListener("resize", function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
